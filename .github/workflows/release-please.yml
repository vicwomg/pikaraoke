on:
  workflow_dispatch:  # Manual trigger only - go to Actions tab to run

name: release-please

permissions:
  contents: write
  pull-requests: write


jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
    - name: Release Please
      id: release
      uses: googleapis/release-please-action@v4
      with:
        token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # release-please's python release type only updates pyproject.toml, version.py,
  # CHANGELOG.md and the manifest. uv.lock also pins pikaraoke's own version, so
  # without this it trails the released version until an unrelated dependency bump
  # happens to regenerate it.
  sync-uv-lock:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    steps:
    - name: Check out the release PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
        token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Sync uv.lock with the released version
      run: |
        uv lock
        if git diff --quiet -- uv.lock; then
          echo "uv.lock already in sync"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git commit uv.lock -m "chore: sync uv.lock with released version"
        git push

  build-and-publish:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/pikaraoke
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Extract version number
      id: get_version
      run: |
        version=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
        echo "VERSION=$version" >> $GITHUB_ENV

    - name: Build Package
      run: uv build

    - name: Publish Python 🐍 distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: build_scripts/docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: vicwomg/pikaraoke:latest,vicwomg/pikaraoke:${{ env.VERSION }}
        cache-from: |
          type=gha,scope=docker-build
          type=gha,scope=docker-build-arm64
        cache-to: type=gha,mode=max,scope=docker-release