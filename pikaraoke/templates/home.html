{% extends 'base.html' %}
{% set use_new_shell = true %}

{% block scripts %}
<style>
  .pk-cta-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--pk-surface);
    border: 1px solid var(--pk-border);
    border-radius: var(--pk-r-md);
    text-decoration: none;
    color: var(--pk-ink);
    transition: border-color 0.2s var(--pk-ease), transform 0.1s var(--pk-ease);
    -webkit-tap-highlight-color: transparent;
  }
  .pk-cta-card:hover { border-color: var(--pk-amber); }
  .pk-cta-card:active { transform: scale(0.99); }
  .pk-cta-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--pk-amber);
    color: var(--pk-bg);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    box-shadow: 0 8px 16px -6px var(--pk-amber-glow);
  }
  .pk-cta-icon i.icon { font-size: 18px; }
  .pk-cta-body { flex: 1; min-width: 0; }
  .pk-cta-title {
    font-weight: 600;
    font-size: 15.5px;
    color: var(--pk-ink);
    letter-spacing: -0.005em;
  }
  .pk-cta-sub {
    font-size: 12.5px;
    color: var(--pk-ink-3);
    margin-top: 1px;
  }
  .pk-cta-arrow {
    color: var(--pk-ink-4);
    font-size: 16px;
  }

  .pk-queue-preview {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pk-queue-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--pk-bg);
    border: 1px solid var(--pk-border);
    border-left: 3px solid var(--pk-amber);
    border-radius: 10px;
    box-shadow: 0 3px 8px -5px rgba(75, 50, 25, 0.22);
  }
  .pk-queue-row:nth-child(1) { transform: rotate(-0.3deg); border-left-color: var(--pk-amber-2); }
  .pk-queue-row:nth-child(2) { transform: rotate(0.3deg); border-left-color: var(--pk-sky); }
  .pk-queue-row:nth-child(3) { transform: rotate(-0.2deg); border-left-color: var(--pk-sun); }
  .pk-queue-row:nth-child(4) { transform: rotate(0.2deg); border-left-color: var(--pk-lime); }
  .pk-queue-row:nth-child(5) { transform: rotate(-0.2deg); border-left-color: var(--pk-amber); }
  .pk-queue-idx {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--pk-surface);
    font-family: var(--pk-font-hand);
    font-size: 20px;
    font-weight: 700;
    color: var(--pk-ink);
  }
  .pk-queue-row:nth-child(1) .pk-queue-idx { background: color-mix(in srgb, var(--pk-amber-2) 20%, var(--pk-surface)); color: var(--pk-amber-2); }
  .pk-queue-row:nth-child(2) .pk-queue-idx { background: color-mix(in srgb, var(--pk-sky) 45%, var(--pk-surface)); }
  .pk-queue-row:nth-child(3) .pk-queue-idx { background: color-mix(in srgb, var(--pk-sun) 28%, var(--pk-surface)); }
  .pk-queue-row:nth-child(4) .pk-queue-idx { background: color-mix(in srgb, var(--pk-lime) 28%, var(--pk-surface)); }
  .pk-queue-body { min-width: 0; }
  .pk-queue-title {
    font-family: var(--pk-font-display);
    font-variation-settings: "opsz" 72, "SOFT" 40;
    font-size: 15px;
    font-weight: 500;
    color: var(--pk-ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.005em;
    line-height: 1.15;
  }
  .pk-queue-singer {
    font-family: var(--pk-font-body);
    font-size: 11.5px;
    color: var(--pk-ink-2);
    margin-top: 2px;
  }
  .pk-queue-singer i.icon { display: none; }
  .pk-queue-singer .singer {
    font-family: var(--pk-font-hand);
    font-size: 14.5px;
    color: var(--pk-amber-2);
    font-weight: 600;
    margin-left: 2px;
  }

  .pk-empty {
    padding: 24px 16px;
    text-align: center;
    color: var(--pk-ink-3);
    font-size: 14px;
    font-family: var(--pk-font-display);
    font-style: italic;
    font-variation-settings: "opsz" 14, "SOFT" 60;
  }

  .pk-home-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 18px;
  }
  .pk-home-actions .pk-btn { text-align: center; justify-content: center; }

  .pk-queue-more {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--pk-amber);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    margin-top: 10px;
  }
</style>

<script>
(function () {
  'use strict';

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    const $wrap = document.getElementById('pk-home-queue');
    if (!$wrap) return;
    const $count = document.getElementById('pk-home-queue-count');

    refresh();
    if (window.socket) {
      window.socket.on('queue_update', refresh);
      window.socket.on('now_playing', refresh);
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refresh();
    });

    function refresh() {
      Promise.all([
        fetch('{{ url_for("queue.get_queue") }}').then((r) => r.text()),
        fetch('{{ url_for("now_playing.now_playing") }}').then((r) => r.text()),
      ]).then(([qt, npt]) => {
        try {
          const queue = JSON.parse(qt);
          const np = npt ? JSON.parse(npt) : null;
          render(queue, np);
        } catch (_) {}
      });
    }

    function render(queue, np) {
      const n = queue.length;
      $count.textContent = n ? `${n}` : '';
      const playing = !!(np && np.now_playing);

      if (n === 0) {
        $wrap.innerHTML = playing
          ? `<p class="pk-empty">Po tym utworze — cisza. Dorzuć coś do kolejki.</p>`
          : `<p class="pk-empty">Kolejka pusta. Dodaj pierwszy utwór.</p>`;
        return;
      }

      const preview = queue.slice(0, 5);
      let html = preview
        .map(
          (item, i) => `
            <div class="pk-queue-row">
              <div class="pk-queue-idx">${i + 1}</div>
              <div class="pk-queue-body">
                <div class="pk-queue-title">${escHtml(stripQuotes(item.title))}</div>
                <div class="pk-queue-singer">śpiewa <span class="singer">${escHtml(item.user || '')}</span></div>
              </div>
            </div>`
        )
        .join('');

      if (n > 5) {
        html += `<a class="pk-queue-more" href="{{ url_for('queue.queue') }}">Zobacz wszystkie (+${n - 5})</a>`;
      }

      $wrap.innerHTML = html;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = String(s || '');
      return d.innerHTML;
    }
  }
})();
</script>
{% endblock %}

{% block content %}

<div class="pk-home-hero">
  <h1 class="pk-view-title" style="text-align: center; margin-top: 10px;">Dziś <em>śpiewamy</em></h1>
  {% if pk_hero_subtitle %}
  <div class="pk-view-eyebrow" style="display: block; text-align: center; transform: rotate(0); margin: 6px 0 12px;">{{ pk_hero_subtitle }}</div>
  {% endif %}
</div>

<a class="pk-cta-card" href="{{ url_for('search.search') }}">
  <span class="pk-cta-icon"><i class="icon icon-search-1"></i></span>
  <span class="pk-cta-body">
    <span class="pk-cta-title">Znajdź piosenkę</span>
  </span>
  <i class="icon icon-right-big pk-cta-arrow"></i>
</a>

<div class="pk-section-label">
  <span>Następne w kolejce</span>
  <span class="pk-count" id="pk-home-queue-count"></span>
</div>

<div class="pk-queue-preview" id="pk-home-queue">
  <p class="pk-empty">Ładowanie…</p>
</div>

{% endblock %}
