{% extends 'base.html' %}
{% set use_new_shell = true %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<style>
  .pk-queue-toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .pk-queue-toolbar .pk-random {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--pk-surface);
    border: 1px solid var(--pk-border);
    border-radius: var(--pk-r-md);
    padding: 2px 6px 2px 12px;
    font-size: 13px;
    color: var(--pk-ink-2);
  }
  .pk-queue-toolbar .pk-random input {
    width: 44px;
    height: 30px;
    border: 0;
    background: var(--pk-surface-2);
    color: var(--pk-ink);
    border-radius: 6px;
    text-align: center;
    font-family: var(--pk-font-mono);
    font-size: 13px;
    padding: 0 4px;
  }
  .pk-queue-toolbar .pk-random button {
    background: transparent;
    border: 0;
    color: var(--pk-amber);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 16px;
    -webkit-tap-highlight-color: transparent;
  }

  .pk-queue-now {
    position: relative;
    padding: 14px 14px 14px 48px;
    background: linear-gradient(90deg,
      color-mix(in srgb, var(--pk-amber) 22%, var(--pk-surface)),
      var(--pk-surface));
    border: 1px solid var(--pk-border-strong);
    border-radius: var(--pk-r-md);
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
  }
  .pk-queue-now::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--pk-amber);
    box-shadow: 0 0 0 4px var(--pk-amber-glow);
    animation: pk-pulse 2.2s infinite;
  }
  .pk-queue-now-label {
    font-family: var(--pk-font-hand);
    font-size: 16px;
    color: var(--pk-lime);
    font-weight: 600;
    margin-bottom: 2px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    line-height: 1;
  }
  .pk-queue-now-label::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--pk-lime);
    border-radius: 50%;
    box-shadow: 0 0 5px var(--pk-lime);
  }
  .pk-queue-now-title {
    font-family: var(--pk-font-display);
    font-variation-settings: "opsz" 72, "SOFT" 40;
    font-size: 17px;
    font-weight: 500;
    color: var(--pk-ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.01em;
    margin-top: 2px;
  }
  .pk-queue-now-singer {
    font-family: var(--pk-font-body);
    font-size: 11.5px;
    color: var(--pk-ink-2);
    margin-top: 1px;
  }
  .pk-queue-now-singer i.icon { display: none; }
  .pk-queue-now-singer .singer {
    font-family: var(--pk-font-hand);
    font-size: 14.5px;
    color: var(--pk-amber-2);
    font-weight: 600;
    margin-left: 2px;
  }
  .pk-queue-now-options {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid var(--pk-border-strong);
    color: var(--pk-ink-2);
    display: grid;
    place-items: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .pk-queue-now-options i.icon { font-size: 15px; }

  .pk-queue-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pk-queue-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--pk-bg);
    border: 1px solid var(--pk-border);
    border-left: 3px solid var(--pk-amber);
    border-radius: 10px;
    box-shadow: 0 3px 8px -5px rgba(75, 50, 25, 0.22);
    cursor: pointer;
    position: relative;
    transition: background 0.15s var(--pk-ease);
  }
  .pk-queue-row:nth-child(4n+1) { border-left-color: var(--pk-amber-2); transform: rotate(-0.25deg); }
  .pk-queue-row:nth-child(4n+2) { border-left-color: var(--pk-sky); transform: rotate(0.3deg); }
  .pk-queue-row:nth-child(4n+3) { border-left-color: var(--pk-sun); transform: rotate(-0.2deg); }
  .pk-queue-row:nth-child(4n)   { border-left-color: var(--pk-lime); transform: rotate(0.2deg); }
  .pk-queue-row.is-drag-handle { grid-template-columns: 24px 32px 1fr auto; }
  .pk-queue-row.is-chosen {
    background: color-mix(in srgb, var(--pk-amber) 20%, var(--pk-surface));
    box-shadow: var(--pk-shadow-elev);
    border-radius: var(--pk-r-sm);
  }
  .pk-queue-row.is-moved {
    animation: pk-highlight-fade 1.5s ease-out;
  }
  @keyframes pk-highlight-fade {
    0% { background-color: color-mix(in srgb, var(--pk-amber) 30%, transparent); }
    100% { background-color: transparent; }
  }

  .pk-queue-drag {
    display: grid;
    place-items: center;
    color: var(--pk-ink-4);
    cursor: grab;
    touch-action: none;
    font-size: 18px;
    user-select: none;
  }
  .pk-queue-drag:active { cursor: grabbing; }

  .pk-queue-n {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--pk-surface);
    font-family: var(--pk-font-hand);
    font-size: 20px;
    font-weight: 700;
    color: var(--pk-ink);
  }
  .pk-queue-row:nth-child(4n+1) .pk-queue-n { background: color-mix(in srgb, var(--pk-amber-2) 20%, var(--pk-surface)); color: var(--pk-amber-2); }
  .pk-queue-row:nth-child(4n+2) .pk-queue-n { background: color-mix(in srgb, var(--pk-sky) 45%, var(--pk-surface)); }
  .pk-queue-row:nth-child(4n+3) .pk-queue-n { background: color-mix(in srgb, var(--pk-sun) 28%, var(--pk-surface)); }
  .pk-queue-row:nth-child(4n)   .pk-queue-n { background: color-mix(in srgb, var(--pk-lime) 28%, var(--pk-surface)); }

  .pk-queue-body { min-width: 0; }
  .pk-queue-title-r {
    font-family: var(--pk-font-display);
    font-variation-settings: "opsz" 72, "SOFT" 40;
    font-size: 15px;
    font-weight: 500;
    color: var(--pk-ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.005em;
    line-height: 1.15;
  }
  .pk-queue-singer-r {
    font-family: var(--pk-font-body);
    font-size: 11.5px;
    color: var(--pk-ink-2);
    margin-top: 2px;
  }
  .pk-queue-singer-r i.icon { display: none; }
  .pk-queue-singer-r .singer {
    font-family: var(--pk-font-hand);
    font-size: 14.5px;
    color: var(--pk-amber-2);
    font-weight: 600;
    margin-left: 2px;
  }

  .pk-queue-cog {
    color: var(--pk-ink-4);
    padding: 6px 4px;
    display: grid;
    place-items: center;
    font-size: 16px;
    background: transparent;
    border: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Download progress */
  .pk-download {
    padding: 14px 16px;
    background: var(--pk-surface);
    border: 1px solid var(--pk-border);
    border-radius: var(--pk-r-md);
    margin-bottom: 10px;
  }
  .pk-download-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--pk-ink);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pk-download-bar {
    height: 6px;
    background: var(--pk-surface-3);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .pk-download-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pk-amber), var(--pk-amber-2));
    border-radius: 100px;
    transition: width 0.3s var(--pk-ease);
  }
  .pk-download-bar-fill.is-success { background: var(--pk-lime); }
  .pk-download-bar-fill.is-error { background: var(--pk-danger); }
  .pk-download-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--pk-font-mono);
    font-size: 10.5px;
    color: var(--pk-ink-3);
    letter-spacing: 0.04em;
  }

  .pk-download-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--pk-surface);
    border: 1px solid var(--pk-border);
    border-radius: var(--pk-r-md);
    margin-bottom: 6px;
    font-size: 13px;
  }
  .pk-download-row-title {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--pk-ink-2);
  }
  .pk-download-tag {
    font-family: var(--pk-font-mono);
    font-size: 9.5px;
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .pk-download-tag.is-pending { background: var(--pk-surface-3); color: var(--pk-ink-3); }
  .pk-download-tag.is-error { background: color-mix(in srgb, var(--pk-danger) 22%, var(--pk-bg)); color: var(--pk-danger); }
  .pk-download-dismiss {
    background: transparent;
    border: 0;
    color: var(--pk-ink-3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 4px 6px;
  }

  /* Bottom sheet with options */
  .pk-opt-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    color: var(--pk-ink);
    text-decoration: none;
    cursor: pointer;
    border-bottom: 1px solid var(--pk-border);
    font-size: 14.5px;
    -webkit-tap-highlight-color: transparent;
  }
  .pk-opt-row:last-child { border-bottom: 0; }
  .pk-opt-row i.icon { width: 24px; text-align: center; color: var(--pk-ink-3); font-size: 15px; }
  .pk-opt-row.is-danger { color: var(--pk-danger); }
  .pk-opt-row.is-danger i.icon { color: var(--pk-danger); }
  .pk-opt-row[hidden] { display: none !important; }

  .pk-empty-queue {
    text-align: center;
    padding: 40px 20px;
    color: var(--pk-ink-3);
    font-family: var(--pk-font-display);
    font-style: italic;
    font-variation-settings: "opsz" 14, "SOFT" 60;
  }
</style>

<script>
(function () {
  'use strict';

  const isAdmin = {{ pk_admin|tojson }};
  let queueState = { queue: [], nowPlaying: null };
  let sortableInstance = null;
  let highlightFile = null;
  let downloadTimer = null;

  if (typeof window.socket === 'undefined') window.socket = io();

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = String(s == null ? '' : s);
    return d.innerHTML;
  }

  function renderQueue() {
    const $list = document.getElementById('pk-queue-list');
    const $now = document.getElementById('pk-queue-now');
    const $empty = document.getElementById('pk-queue-empty');
    const np = queueState.nowPlaying;
    const q = queueState.queue;

    // Now playing card
    if (np && np.now_playing) {
      $now.hidden = false;
      $now.querySelector('[data-pk-np-title]').textContent = stripQuotes(np.now_playing);
      $now.querySelector('[data-pk-np-singer]').textContent = np.now_playing_user || '';
    } else {
      $now.hidden = true;
    }

    // Empty state
    if (!q.length && !(np && np.now_playing)) {
      $empty.hidden = false;
      $list.innerHTML = '';
      return;
    }
    $empty.hidden = true;

    // Queue list
    $list.innerHTML = q
      .map((item, i) => {
        const dragHandle = isAdmin
          ? `<div class="pk-queue-drag drag-handle" title="Przeciągnij aby zmienić kolejność"><i class="icon icon-braille"></i></div>`
          : '';
        const cog = isAdmin
          ? `<button type="button" class="pk-queue-cog pk-queue-opts" data-idx="${i}" data-file="${encodeURIComponent(item.file)}" data-title="${encodeURIComponent(item.title)}" aria-label="Opcje"><i class="icon icon-cog"></i></button>`
          : '';
        const cls = 'pk-queue-row' + (isAdmin ? ' is-drag-handle' : '');
        return `
          <div class="${cls}" data-index="${i}" data-file="${encodeURIComponent(item.file)}">
            ${dragHandle}
            <div class="pk-queue-n">${i + 1}</div>
            <div class="pk-queue-body">
              <div class="pk-queue-title-r">${escHtml(stripQuotes(item.title))}</div>
              <div class="pk-queue-singer-r">śpiewa <span class="singer">${escHtml(item.user || '')}</span></div>
            </div>
            ${cog}
          </div>`;
      })
      .join('');

    initSortable();

    if (highlightFile) {
      const rows = $list.querySelectorAll('.pk-queue-row');
      rows.forEach((r) => {
        if (decodeURIComponent(r.dataset.file) === highlightFile) r.classList.add('is-moved');
      });
      highlightFile = null;
    }
  }

  function initSortable() {
    if (!isAdmin) return;
    const $list = document.getElementById('pk-queue-list');
    if (!$list) return;
    if (sortableInstance) {
      sortableInstance.destroy();
      sortableInstance = null;
    }
    if (!$list.querySelectorAll('.drag-handle').length) return;
    sortableInstance = Sortable.create($list, {
      handle: '.drag-handle',
      animation: 150,
      chosenClass: 'is-chosen',
      delay: 100,
      delayOnTouchOnly: true,
      touchStartThreshold: 5,
      onEnd(evt) {
        if (evt.oldIndex === evt.newIndex) return;
        const movedFile = decodeURIComponent(evt.item.dataset.file);
        highlightFile = movedFile;
        // Update visual numbers immediately
        $list.querySelectorAll('.pk-queue-row .pk-queue-n').forEach((n, i) => {
          n.textContent = String(i + 1).padStart(2, '0');
        });
        $.post('{{ url_for("queue.reorder") }}', {
          old_index: evt.oldIndex,
          new_index: evt.newIndex,
        });
      },
    });
  }

  function refreshQueue() {
    $.when(
      $.get('{{ url_for("queue.get_queue") }}'),
      $.get('{{ url_for("now_playing.now_playing") }}')
    ).done(function (qResp, npResp) {
      try {
        const newQ = JSON.parse(qResp[0]);
        const newNp = npResp[0] ? JSON.parse(npResp[0]) : null;
        if (!isEqual(newQ, queueState.queue) || !isEqual(newNp, queueState.nowPlaying)) {
          queueState.queue = newQ;
          queueState.nowPlaying = newNp;
          renderQueue();
        }
      } catch (_) {}
    });
  }

  // Downloads polling
  function renderDownloads(status) {
    const $box = document.getElementById('pk-downloads');
    if (!status || (!status.active && !(status.pending && status.pending.length) && !(status.errors && status.errors.length))) {
      $box.innerHTML = '';
      $box.hidden = true;
      return;
    }
    let html = '';
    if (status.active) {
      const d = status.active;
      let barCls = '';
      if (d.status === 'complete') barCls = 'is-success';
      if (d.status === 'error') barCls = 'is-error';
      html += `
        <div class="pk-download">
          <div class="pk-download-title">${escHtml(d.title)}</div>
          <div class="pk-download-bar"><div class="pk-download-bar-fill ${barCls}" style="width: ${d.progress}%"></div></div>
          <div class="pk-download-meta">
            <span>${escHtml(d.status)}</span>
            <span>${escHtml(d.speed)} · ETA ${escHtml(d.eta)}</span>
          </div>
        </div>`;
    }
    (status.pending || []).forEach((d) => {
      html += `
        <div class="pk-download-row">
          <span class="pk-download-row-title">${escHtml(d.display_title || d.video_url)}</span>
          <span class="pk-download-tag is-pending">w kolejce</span>
        </div>`;
    });
    (status.errors || []).forEach((d) => {
      html += `
        <div class="pk-download-row">
          <span class="pk-download-row-title" title="${escHtml(d.error)}">${escHtml(d.title || d.url)}</span>
          <span class="pk-download-tag is-error">błąd</span>
          <button type="button" class="pk-download-dismiss" data-err-id="${escHtml(d.id)}" aria-label="Odrzuć">&times;</button>
        </div>`;
    });

    $box.innerHTML = html;
    $box.hidden = false;
  }

  function pollDownloads() {
    if (downloadTimer) clearTimeout(downloadTimer);
    $.get('{{ url_for("queue.get_current_downloads") }}').done(function (data) {
      try {
        const status = JSON.parse(data);
        renderDownloads(status);
        if (status.active || (status.pending && status.pending.length)) {
          downloadTimer = setTimeout(pollDownloads, 500);
        }
      } catch (_) {}
    });
  }

  // Event bindings
  $(function () {
    refreshQueue();
    pollDownloads();

    window.socket.off('queue_update');
    window.socket.on('queue_update', refreshQueue);
    window.socket.off('now_playing');
    window.socket.on('now_playing', refreshQueue);
    window.socket.off('download_started');
    window.socket.on('download_started', pollDownloads);
    window.socket.off('download_stopped');
    window.socket.on('download_stopped', pollDownloads);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        refreshQueue();
        pollDownloads();
      }
    });

    // Queue row options
    $(document).off('click.pk-q-opts').on('click.pk-q-opts', '.pk-queue-opts', function (e) {
      e.preventDefault();
      e.stopPropagation();
      const idx = parseInt(this.dataset.idx, 10);
      const file = decodeURIComponent(this.dataset.file);
      const title = decodeURIComponent(this.dataset.title);
      openQueueOptions(idx, file, title);
    });

    // Now playing options
    $(document).off('click.pk-np-opts').on('click.pk-np-opts', '.pk-queue-now-options', function (e) {
      e.preventDefault();
      openNpOptions();
    });

    // Dismiss download error
    $(document).on('click', '.pk-download-dismiss', function () {
      const id = this.dataset.errId;
      $.ajax({
        url: '/queue/downloads/errors/' + encodeURIComponent(id),
        method: 'DELETE',
      }).always(pollDownloads);
    });
  });

  // ----- Queue row options sheet -----
  async function openQueueOptions(idx, file, title) {
    const t = window.translations || {};
    const sheet = buildOptionsSheet(title, [
      { id: 'top', label: 'Następny', icon: 'icon-angle-double-up', hideFirst: true },
      { id: 'up', label: 'Wyżej', icon: 'icon-angle-up', hideFirst: true },
      { id: 'down', label: 'Niżej', icon: 'icon-angle-down', hideLast: true },
      { id: 'bottom', label: 'Na koniec', icon: 'icon-angle-double-down', hideLast: true },
      { id: 'delete', label: 'Usuń z kolejki', icon: 'icon-trash-empty', danger: true },
    ], { idx, queueLen: queueState.queue.length });

    const action = await sheet;
    if (!action) return;

    if (action === 'delete') {
      const ok = await PK.dialog.confirm({
        title: t.removeFromQueueTitle || 'Remove from queue?',
        message: title,
        destructive: true,
        confirmText: t.removeBtn || 'Remove',
        cancelText: t.cancelBtn || 'Cancel',
      });
      if (!ok) return;
    }

    highlightFile = (action !== 'delete') ? file : null;
    $.get('/queue/edit?song=' + encodeURIComponent(file) + '&action=' + action);
  }

  async function openNpOptions() {
    const np = queueState.nowPlaying;
    if (!np || !np.now_playing) return;
    const t = window.translations || {};
    const pauseLabel = np.is_paused ? 'Wznów' : 'Pauza';
    const pauseIcon = np.is_paused ? 'icon-play' : 'icon-pause';

    const action = await buildOptionsSheet(np.now_playing, [
      { id: 'restart', label: 'Od początku', icon: 'icon-to-start' },
      { id: 'pause', label: pauseLabel, icon: pauseIcon },
      { id: 'skip', label: 'Pomiń', icon: 'icon-to-end', danger: true },
    ], {});

    if (!action) return;

    if (action === 'skip') {
      const ok = await PK.dialog.confirm({
        title: t.skipTitle || 'Skip this track?',
        message: t.confirmSkip,
        destructive: true,
        confirmText: t.skipBtn || 'Skip',
        cancelText: t.cancelBtn || 'Cancel',
      });
      if (!ok) return;
    }
    $.get('/' + action);
  }

  function buildOptionsSheet(title, items, ctx) {
    return new Promise((resolve) => {
      const $backdrop = document.createElement('div');
      $backdrop.className = 'pk-sheet-backdrop';
      const $sheet = document.createElement('div');
      $sheet.className = 'pk-sheet';

      const rows = items.map((it) => {
        if (it.hideFirst && ctx.idx === 0) return '';
        if (it.hideLast && ctx.queueLen && ctx.idx >= ctx.queueLen - 1) return '';
        return `<a class="pk-opt-row ${it.danger ? 'is-danger' : ''}" data-action="${it.id}"><i class="icon ${it.icon}"></i>${escHtml(it.label)}</a>`;
      }).join('');

      $sheet.innerHTML = `
        <div class="pk-sheet-grabber"></div>
        <div class="pk-sheet-head">
          <span class="pk-sheet-title">${escHtml(title)}</span>
          <button type="button" class="pk-btn is-ghost is-sm" data-close>Zamknij</button>
        </div>
        <div class="pk-sheet-body">${rows}</div>`;

      document.body.appendChild($backdrop);
      document.body.appendChild($sheet);
      requestAnimationFrame(() => {
        $backdrop.classList.add('is-open');
        $sheet.classList.add('is-open');
      });

      function cleanup(result) {
        $backdrop.classList.remove('is-open');
        $sheet.classList.remove('is-open');
        setTimeout(() => {
          $backdrop.remove();
          $sheet.remove();
        }, 350);
        resolve(result);
      }

      $backdrop.addEventListener('click', () => cleanup(null));
      $sheet.querySelector('[data-close]').addEventListener('click', () => cleanup(null));
      $sheet.querySelectorAll('.pk-opt-row').forEach((row) => {
        row.addEventListener('click', (e) => {
          e.preventDefault();
          cleanup(row.dataset.action);
        });
      });
    });
  }
})();
</script>
{% endblock %}

{% block content %}

<div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; flex-wrap: wrap; gap: 8px;">
  <h1 class="pk-view-title" style="margin-bottom: 0;">Kolejka</h1>
</div>

{% if admin %}
<div class="pk-queue-toolbar">
  <a class="pk-btn is-sm is-danger confirm-clear" href="/queue/edit?action=clear" style="margin-left: auto;">
    <i class="icon icon-trash-empty"></i>
    Wyczyść
  </a>
</div>
{% endif %}

<div id="pk-downloads" hidden></div>

<div id="pk-queue-now" class="pk-queue-now" hidden>
  <div>
    <div class="pk-queue-now-label">gra teraz</div>
    <div class="pk-queue-now-title" data-pk-np-title></div>
    <div class="pk-queue-now-singer">śpiewa <span class="singer" data-pk-np-singer></span></div>
  </div>
  {% if admin %}
  <button type="button" class="pk-queue-now-options" aria-label="Opcje">
    <i class="icon icon-cog"></i>
  </button>
  {% endif %}
</div>

<div id="pk-queue-list" class="pk-queue-list"></div>

<p id="pk-queue-empty" class="pk-empty-queue" hidden>
  Kolejka pusta. Dodaj pierwszy utwór.
</p>

{% endblock %}
